# PNSGA3 experiment configuration
# Each experiment is a grid over the listed parameters; use lists for multiple values.

experiments:
  - name: c1dtlz1_13_16_19
    # -------------------------------------------------------------------------
    # Problem and decision variables
    # -------------------------------------------------------------------------
    problem: c1dtlz1          # Problem name (e.g. c1dtlz1, dtlz1)
    n_var: [12]               # Number of decision variables (list for grid)

    # -------------------------------------------------------------------------
    # Objectives and algorithm parameters (grid over these lists)
    # -------------------------------------------------------------------------
    n_obj: [14]         # Number of objectives
    pop_size: [
    #
    #100,200,300,400,500,600,700,800,900,
    1000,
    #1100,1200,1300,1400,1500,1600,1700,1800,1900,
    2000,
    #2100,2200,2300,2400,2500,2600,2700,2800,2900,
    3000,
    #3100,3200,3300,3400,3500,3600,3700,3800,3900,
    4000,
    #4100,4200,4300,4400,4500,4600,4700,4800,4900,
    5000,
    #5100,5200,5300,5400,5500,5600,5700,5800,5900,
    6000,
    #6100,6200,6300,6400,6500,6600,6700,6800,6900,
    7000,
    #7100,7200,7300,7400,7500,7600,7700,7800,7900,
    8000,
    #8100,8200,8300,8400,8500,8600,8700,8800,8900,
    9000,
    #9100,9200,9300,9400,9500,9600,9700,9800,9900,
    10000,12000,14000,16000,18000,20000,25000,30000,
    ]          # Population size
    n_gen: [50]              # Number of generations
    n_partitions: [3]        # Reference direction partitions (N = C(n_obj + n_partitions - 1, n_partitions))
    n_islands: [10]           # Number of islands in ParallelNSGA3
    migration_interval: [5] # Generations between migrations
    migration_rate: [0.1]    # Fraction of population to migrate (0.0–1.0)
    seed: [1]                # Random seed(s); multiple seeds = multiple runs per config

    # -------------------------------------------------------------------------
    # Algorithm / experiment flags
    # -------------------------------------------------------------------------
    # pnsga3_only:
    #   true  = Run only ParallelNSGA3; skip NSGA3 baseline (faster for PNSGA3-only experiments)
    #   false = Run both NSGA3 and ParallelNSGA3 for comparison
    pnsga3_only: false

    # output_dir: Directory for logs, caches, SUMMARY/*.npy (default: exp_logs)
    output_dir: exp_logs3

    # metrics_every_gen:
    #   true  = Compute IGD/HV every generation (needed for line plots over generations)
    #   false = Compute IGD/HV only on last generation (faster; SUMMARY still has final IGD/HV)
    metrics_every_gen: true

    # hv_enabled:
    #   true  = Compute Hypervolume (HV) in addition to IGD
    #   false = Disable HV entirely; only IGD/GD computed (HV columns become NaN; faster for high n_obj)
    hv_enabled: false

    # pymoo_timing:
    #   true  = Print [timing]/[advance]/[survival] each generation (for performance debugging)
    #   false = No per-generation timing output
    pymoo_timing: true

    # plot_after_run:
    #   true  = After each run, show a figure (IGD/HV curves + Pareto front scatter) and block until closed
    #   false = Do not show figure after each run (for batch/grid; use plot.py later for charts)
    plot_after_run: false

    # focus_alpha:
    #   0.0  = Original ParallelNSGA3 (no per-island objective focus; survival uses raw objectives)
    #   >0   = For each island, upweight a fixed subset of objectives during survival/selection only
    #         (objectives are distributed approximately evenly across islands; IGD/HV still use raw objectives).
    focus_alpha: [0.05,0.06,0.07,0.08,0.09,0.10, 0.11,0.12,0.13,0.14,0.15, ]
