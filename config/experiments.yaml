experiments:
  - name: c1dtlz1_13_16_19
    # Problem and decision variables
    problem: c1dtlz1
    n_var: [12]

    # Objectives and algorithm parameters (grid over these lists)
    n_obj: [7,8,9]
    pop_size: [120]
    n_gen: [50]
    n_partitions: [3]
    n_islands: [4]
    migration_interval: [3]
    migration_rate: [0.1]
    seed: [1]

    # Algorithm/experiment flags
    pnsga3_only: false
    output_dir: nsga_logs
    metrics_every_gen: True    # false = only compute IGD/HV on last generation
    hv_enabled: false          # false = disable HV entirely (IGD only)
    pymoo_timing: true         # true  = print detailed per-generation timing

